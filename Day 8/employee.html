<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Employee Details Forms</h1>
    <form action="">
        <label for="name">Full Name</label>
        <input type="text" name="fname" id="name" placeholder="Enter Your full name">
        <br><br>
         <label for="email">Email</label>
        <input type="email" name="femail" id="email" placeholder="Enter Your email addres">
          <br><br>
         <label for="phone">Phone</label>
        <input type="tel" name="fphone" id="phone" placeholder="Enter Your phone number">
          <br><br>
         <label for="">Gender</label>
        <input type="radio" name="Gender" id="male">
        <label for="male">Male</label>
         <input type="radio" name="Gender" id="Female">
        <label for="Female">Female</label>
         <input type="radio" name="Gender" id="other">
        <label for="other">Other</label>
        <br><br>
        <label for="job">Job Title:</label>
        <input type="text" name="job title" id="job" placeholder="Enter your job title">
        <br><br>
        <label for="department">Department:</label>
        <select name="job title" id="department">
            <option value="" disabled selected>Select your department</option>
            <option value="Engineering">Engineering</option>
            <option value="Finance">Finance</option>
            <option value="Labour">Labour</option>
            <option value="Income Tax">Income Tax</option>
        </select>
        <br>
            <br>
            <button>submit</button>

        
        
        
        
    </form>
</body>
</html>
