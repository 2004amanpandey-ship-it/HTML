<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <fieldset>
        <legend>IIT JEE Registration Form</legend>
    <form action="">
        <label for="name">Full Name:</label>
        <input type="text" name="fname" id="name">
        <br><br>
        <label for="email">Email:</label>
        <input type="email" name="femail" id="email">
        <br><br>
        <label for="phone">Phone:</label>
        <input type="tel" name="fphone" id="phone">
        <br><br>
        <label for="pass">Password:</label>
        <input type="password" name="passcode" id="pass">
        <br><br>
        <label for="">Gender:</label>
        <input type="radio" name="gender" id="male">
        <label for="male">Male</label>
        <input type="radio" name="gender" id="Female">
        <label for="Female">Female</label>
        <input type="radio" name="gender" id="Other">
        <label for="Other">Other</label>
        <br>
        <br>
        <label for="dob">Date of Birth:</label>
        <input type="date" name="date" id="dob" min="2000-01-01" max="2005-01-01">
        <br><br>
        <label for="school">School Name:</label>
        <input type="text" name="schoolname" id="school">
        <br><br>
        <label for="Board">Board:</label>
        <select name="Board" id="Board">
            <option value="" selected disabled>Select Your Board</option>
            <option value="ICSE">ICSE</option>
            <option value="UP">UP</option>
            <option value="CBSE">CBSE</option>
            <option value="Rajesthan">Rajesthan</option>
        </select>
        <br><br>
        <label for="year">Year of passing:</label>
        <input type="number" name="yop" id="year" min="2000" max="2005">
        <br>
        <br>
          <label for="Center">Exam-Center:</label>
        <select name="Exam Center" id="Center">
            <option value="" selected disabled>Select Your Center</option>
            <option value="MZP">MZP</option>
            <option value="UP">UP</option>
            <option value="GOA">GOA</option>
            <option value="Rajesthan">Rajesthan</option>
        </select>
        <br><br>
        <button>Register</button>


    </form>
    </fieldset>
</body>
</html>
