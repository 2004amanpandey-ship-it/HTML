<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table border="1">
        <caption>My Multi Lever Table </caption>
        <thead>
         
        </thead>
        <tbody>
               <tr>
                <td rowspan="2" colspan="2" style="font-weight: bold;" align="center">Column 0</td>
                <td rowspan="2" style="font-weight: bold;">Column 1</td>
                <td colspan="2" style="font-weight: bold;" align="center">Column 2</td>
            </tr>
            <tr>
                <td style="font-weight: bold;">Column 2a</td>
                <td style="font-weight: bold;">Column 2b</td>
            </tr>
            <tr>
                <td rowspan="2" style="font-weight: bold;">Row 1</td>
                <td style="font-weight: bold;">Row 1a</td>
                <td>123</td>
                <td>456</td>
                <td>789</td>
            </tr>
            <tr>
                <td style="font-weight: bold;">Row 1b</td>
                <td>123</td>
                <td>456</td>
                <td>789</td>
            </tr>
            <tr>
                <td colspan="2" style="font-weight: bold;" align="center">Row 2</td>
                <td>123</td>
                <td>456</td>
                <td>789</td>
            </tr>
        </tbody>
    </table>
    
</body>
